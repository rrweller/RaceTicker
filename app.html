<style>
  .race-ticker {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #ffffff;
    background: rgba(8, 10, 12, 0.28);
  }
  .race-ticker .header {
    min-height: 42px;
    border: 3px solid #ffffff;
    background: url(/ui/modules/apps/RaceTicker/topbar.png) center center / cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px 10px;
    box-sizing: border-box;
  }
  .race-ticker .header-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 1px 1px rgba(0, 0, 0, 0.9);
  }
  .race-ticker .header-phase {
    font-size: 11px;
    margin-top: 2px;
    opacity: 0.88;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .race-ticker .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 34px;
    padding: 5px 8px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.56);
    border: 1px solid #ffffff;
  }
  .race-ticker .lap-group {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-right: 4px;
  }
  .race-ticker .lap-button {
    border-radius: 1px;
    color: #ffffff;
    font-size: 14px;
    background: #d98934;
    padding: 3px 7px;
    border: 1px solid #ffffff;
    cursor: pointer;
  }
  .race-ticker .lap-button[disabled] {
    opacity: 0.42;
    cursor: default;
  }
  .race-ticker .lap-label {
    font-size: 13px;
    min-width: 92px;
    white-space: nowrap;
  }
  .race-ticker .toggle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    white-space: nowrap;
  }
  .race-ticker .toggle input {
    margin: 0;
  }
  .race-ticker .source {
    margin-left: auto;
    font-size: 11px;
    opacity: 0.82;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .race-ticker .list {
    flex: 1;
    overflow-x: hidden;
    overflow-y: auto;
    padding-top: 4px;
    box-sizing: border-box;
  }
  .race-ticker .row {
    width: 100%;
    min-height: 34px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    box-sizing: border-box;
    background: url(/ui/modules/apps/RaceTicker/carbar.png) center center / cover no-repeat;
    border: 0;
    color: #ffffff;
    text-align: left;
    cursor: pointer;
  }
  .race-ticker .row + .row {
    margin-top: 4px;
  }
  .race-ticker .row.is-focus {
    font-weight: 700;
    font-style: italic;
  }
  .race-ticker .row.is-warning .name {
    color: #ff5c38;
  }
  .race-ticker .position {
    width: 18px;
    font-size: 20px;
    font-style: italic;
    text-align: center;
    color: #111111;
    text-shadow: -1px -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 1px 0 #ffffff, 1px 1px 0 #ffffff;
  }
  .race-ticker .main {
    min-width: 0;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .race-ticker .name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #ffffff;
  }
  .race-ticker .gap {
    margin-left: auto;
    color: #ff5c38;
    font-weight: 700;
    font-style: italic;
    white-space: nowrap;
  }
  .race-ticker .gap.is-leader {
    color: #3fb0ff;
  }
  .race-ticker .fuel {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 8px;
    color: #f8e36d;
    white-space: nowrap;
  }
  .race-ticker .fuel img {
    width: 20px;
    height: 20px;
    display: block;
  }
  .race-ticker .empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px;
    box-sizing: border-box;
    border: 1px solid #ffffff;
    background: rgba(0, 0, 0, 0.45);
    font-size: 14px;
    line-height: 1.4;
  }
</style>

<div class="bngApp race-ticker">
  <div class="header">
    <div>
      <div class="header-title">AIT AI Race Leaderboard</div>
      <div class="header-phase" ng-if="raceTicker.state.phase">{{ raceTicker.state.phase }}</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="lap-group">
      <button
        class="lap-button"
        ng-click="raceTicker.decrementManualLaps()"
        ng-disabled="raceTicker.usesOfficialLapCount()">-</button>
      <div class="lap-label">{{ raceTicker.currentLapLabel() }}</div>
      <button
        class="lap-button"
        ng-click="raceTicker.incrementManualLaps()"
        ng-disabled="raceTicker.usesOfficialLapCount()">+</button>
    </div>

    <label class="toggle">
      <input type="checkbox" ng-model="raceTicker.settings.showFuel" ng-change="raceTicker.refresh()">
      <span>Fuel</span>
    </label>

    <label class="toggle">
      <input type="checkbox" ng-model="raceTicker.settings.showLapsDown" ng-change="raceTicker.refresh()">
      <span>{{ raceTicker.settings.showLapsDown ? 'Laps' : 'Gap' }}</span>
    </label>

    <div class="source">{{ raceTicker.sourceLabel() }}</div>
  </div>

  <div class="list" ng-if="raceTicker.state.rows.length">
    <button
      class="row"
      ng-repeat="row in raceTicker.state.rows track by row.vehId"
      ng-class="{ 'is-focus': row.isPlayerFocus, 'is-warning': row.isWarning }"
      ng-click="raceTicker.jumpToVehicle(row.vehId)">
      <div class="position">{{ row.position }}</div>
      <div class="main">
        <div class="name">{{ row.name }}</div>
        <div class="gap" ng-class="{ 'is-leader': row.isLeader }">{{ row.gapLabel }}</div>
      </div>
      <div class="fuel" ng-if="raceTicker.settings.showFuel">
        <img ng-src="/ui/modules/apps/RaceTicker/fuel.png" alt="">
        <span>{{ row.fuelLabel }}</span>
      </div>
    </button>
  </div>

  <div class="empty" ng-if="!raceTicker.state.rows.length">{{ raceTicker.state.statusText }}</div>
</div>
